# CI de Nível 01 - Disparo Manual através de clique

name: 'Execução Manual'

on:
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # instalação do Java para Allure
      - name: Instalando Java para Allure
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      # instalação das dependências
      - name: Instalando dependências
        run: yarn install

      # instalação dos browsers do Playwright
      - name: Instalando Browsers do Playwright
        run: yarn playwright install --with-deps

      # execução dos testes e2e
      - name: Executando testes e2e
        run: yarn run e2e

      # gera relatório Allure mesmo se o teste falhar
      - name: Gerando Allure Report
        if: always()
        run: yarn run allure:generate

      # permite baixar o relatório
      - name: Publicando artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: |
            allure-report
            allure-results
            test-results